name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: chatwoot
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/chatwoot/ai-chat-generator
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo systemctl restart ai-chat-bot
            sleep 3
            curl -sf http://localhost:5000/chat?message=ping || { echo "Health check failed"; exit 1; }
